name: QA Automation Pipeline

on:
  push:
    paths:
      - 'QA-Engineering/**'
  pull_request:
    paths:
      - 'QA-Engineering/**'

jobs:
  qa-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: QA-Engineering/ecommerce-test-automation-framework

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run UI Tests (Smoke, Parallel)
        run: |
          pytest -n auto --alluredir=allure-results -m "smoke and not api"

      - name: Run API Tests
        run: |
          pytest -m api || true

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: QA-Engineering/ecommerce-test-automation-framework/allure-results

      - name: Upload Failure Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: QA-Engineering/ecommerce-test-automation-framework/reports