name: QA Automation Pipeline

on:
  push:
    paths:
      - 'QA-Engineering/**'
  pull_request:
    paths:
      - 'QA-Engineering/**'

jobs:
  qa-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: QA-Engineering/ecommerce-test-automation-framework

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run Smoke UI Tests
        run: pytest -m "smoke and not api"

      - name: Run API Tests (Non-blocking)
        run: pytest -m api || true

      - name: Run Tests with Allure
        run: pytest --alluredir=allure-results -m "smoke and not api"

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: QA-Engineering/ecommerce-test-automation-framework/allure-results

      - name: Run Parallel Tests
        run: pytest -n auto -m "smoke and not api"